name: QA 자동화 테스트

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Python 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: 라이브러리 설치
      run: |
        pip install selenium pytest pytest-html chromedriver-autoinstaller

    - name: 테스트 실행
      run: |
        pytest --html=report.html